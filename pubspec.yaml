name: naijapaper
description: Nigeria's most intelligent exam prep platform
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ─── State Management ──────────────────────
  flutter_riverpod: ^2.5.1
  hooks_riverpod: ^2.5.1
  flutter_hooks: ^0.20.5

  # ─── Navigation ────────────────────────────
  go_router: ^13.2.0

  # ─── Networking ────────────────────────────
  dio: ^5.4.3

  # ─── Local Storage ─────────────────────────
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.0
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0

  # ─── Realtime ──────────────────────────────
  socket_io_client: ^2.0.3+1

  # ─── Auth ──────────────────────────────────
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.0

  # ─── Firebase ──────────────────────────────
  firebase_core: ^2.31.1
  firebase_messaging: ^14.9.1

  # ─── AI / Voice ────────────────────────────
  # speech_to_text: ^7.0.0  # Temporarily disabled due to Kotlin compilation errors
  flutter_tts: ^4.0.2

  # ─── UI & Animations ───────────────────────
  lottie: ^3.1.2
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  flip_card: ^0.7.0
  fl_chart: ^0.68.0
  table_calendar: ^3.1.2
  flutter_math_fork: ^0.7.2

  # ─── Utilities ─────────────────────────────
  connectivity_plus: ^6.0.3
  permission_handler: ^11.3.1
  image_picker: ^1.1.2
  share_plus: ^10.0.0
  path_provider: ^2.1.3
  url_launcher: ^6.3.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.18.0
  build_runner: ^2.4.11